<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting - Lieblich's Garage</title>
    <!-- HTTPS Redirect -->
    <script>
        if (location.protocol !== 'https:') {
            location.replace('https://' + location.host + location.pathname);
        }
    </script>
    <!-- Redirect to homepage -->
    <meta http-equiv="refresh" content="0; url=https://lieblichsgarage.com/#services">
    <link rel="canonical" href="https://lieblichsgarage.com/#services">
    <script>
        window.location.replace("https://lieblichsgarage.com/#services");
    </script>
</head>
<body>
    <p>Redirecting to <a href="https://lieblichsgarage.com/#services">Lieblich's Garage</a>...</p>
</body>
</html>
